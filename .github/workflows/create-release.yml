name: 'Create Release'

on:
  push:
    tags:
      # Lerna (independent versioning) tags releases as "<package>@<version>".
      # GitHub Actions tag filters: "*" does not match "/", "**" does — so
      # "**@*.*.*" covers both unscoped tags (trading-signals@7.4.3) and
      # scoped tags containing a slash (@typedtrader/exchange@0.2.5).
      - '**@*.*.*'
      # Legacy pre-lerna tag format; kept so re-pushing an old tag still creates a release.
      - 'v*.*.*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: 'Create Release'
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
