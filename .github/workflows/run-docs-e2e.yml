name: 'Run Docs E2E'

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'packages/trading-signals-docs/**'
      - 'packages/exchange/**'
      - 'packages/trading-signals/**'
      - 'packages/trading-strategies/**'
      - 'package.json'
      - 'package-lock.json'
      - '.nvmrc'
      - '.github/workflows/run-docs-e2e.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'packages/trading-signals-docs/**'
      - 'packages/exchange/**'
      - 'packages/trading-signals/**'
      - 'packages/trading-strategies/**'
      - 'package.json'
      - 'package-lock.json'
      - '.nvmrc'
      - '.github/workflows/run-docs-e2e.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-docs-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: 'Install dependencies'
        run: npm ci
      - name: 'Build workspace dependencies'
        run: npx lerna run dist --scope trading-signals-docs --include-dependencies
      - name: 'Install Playwright browsers'
        run: npx playwright install --with-deps chromium
        working-directory: packages/trading-signals-docs
      - name: 'Run Playwright e2e'
        run: npm run test:e2e --workspace=packages/trading-signals-docs
        env:
          CI: 'true'
      - name: 'Upload Playwright report on failure'
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            packages/trading-signals-docs/playwright-report.xml
            packages/trading-signals-docs/playwright-report/
            packages/trading-signals-docs/test-results/
          retention-days: 7
